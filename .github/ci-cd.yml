name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api:latest ./api

      - name: Build Worker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:latest ./worker

      - name: Push API image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api:latest

      - name: Push Worker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:latest
